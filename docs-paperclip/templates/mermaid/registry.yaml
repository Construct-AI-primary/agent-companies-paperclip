# Mermaid Diagram Template Registry
# Central version registry for all parameterized diagram templates.
# When a template is refined, bump its version and add a changelog entry.
# All consuming specs should be re-rendered after a version bump.

templates:
  procurement-lifecycle:
    current: "1.1"
    changelog:
      "1.0": "Initial procurement lifecycle flow extracted from 01900 UI/UX spec"
      "1.1": "Added showPostAward parameter for contract compliance/variation extension"
    parameters:
      - discipline
      - complexity
      - showHITL
      - showPayment
      - showPostAward

  three-state-navigation:
    current: "1.1"
    changelog:
      "1.0": "Initial three-state navigation flow extracted from 01900 UI/UX spec"
      "1.1": "Added showDocumentPanel parameter for 00900 document control integration"
